version: "3.8"

services:
  fuseki:
    image: secoresearch/fuseki:latest
    container_name: cim-fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
      - JAVA_OPTIONS=-Xmx2g
    volumes:
      - fuseki-data:/fuseki
      - ./assets:/data/assets:ro
    networks:
      - cim-network

  workshop-java:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cim-workshop
    volumes:
      - ./src:/workspace/src
      - ./pom.xml:/workspace/pom.xml
      - ./assets:/workspace/assets:ro
      - ./output:/workspace/output
      - ./init-fuseki.sh:/workspace/init-fuseki.sh
      - maven-cache:/root/.m2
    environment:
      - FUSEKI_URL=http://fuseki:3030
    depends_on:
      - fuseki
    networks:
      - cim-network
    stdin_open: true
    tty: true
    command: bash -c "/workspace/init-fuseki.sh && bash"

volumes:
  fuseki-data:
  maven-cache:

networks:
  cim-network:
    driver: bridge
